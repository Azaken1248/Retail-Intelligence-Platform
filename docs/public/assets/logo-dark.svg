<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Clean geometric retail/analytics icon in 7-Eleven colors (Dark Mode) -->
  <!-- Base Ground Line -->
  <line x1="10" y1="85" x2="90" y2="85" stroke="#10B981" stroke-width="4" stroke-linecap="round" />
  
  <!-- Left Bar -->
  <rect x="25" y="50" width="12" height="30" rx="2" fill="#10B981" />
  
  <!-- Middle Bar -->
  <rect x="44" y="30" width="12" height="50" rx="2" fill="#F57E20" />
  
  <!-- Right Bar -->
  <rect x="63" y="15" width="12" height="65" rx="2" fill="#10B981" />
  
  <!-- Upward Trend Line -->
  <path d="M 31 45 L 50 25 L 69 10" fill="none" stroke="#F87171" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  <polygon points="69,5 74,12 66,12" fill="#F87171" />
</svg>
