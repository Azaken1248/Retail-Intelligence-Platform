services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: retail-intelligence-api
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mcp:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: retail-intelligence-mcp
    ports:
      - "8001:8001"
    env_file:
      - ./api/.env
    command: ["python", "-m", "app.mcp.server"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/sse')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
